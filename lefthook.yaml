extends:
  - lefthook-base.yaml

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc}"
      run: biome check --write {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: actionlint
    validate-staleness-sources:
      glob: "scripts/staleness/sources.{yaml,schema.json}"
      run: node scripts/staleness/validate.mjs

pre-push:
  commands:
    typecheck:
      run: npx tsc --noEmit
