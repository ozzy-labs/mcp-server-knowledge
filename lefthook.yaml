extends:
  - lefthook-base.yaml

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc}"
      run: biome check --write {staged_files}
      stage_fixed: true
    taplo:
      glob: "**/*.toml"
      run: taplo format {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: actionlint
    generate-index:
      glob: "knowledge/**/*.md"
      exclude: "knowledge/INDEX.md"
      run: node scripts/generate-index.mjs && git add knowledge/INDEX.md
    validate-staleness-sources:
      glob: "scripts/staleness/sources.{yaml,schema.json}"
      run: node scripts/staleness/validate.mjs

pre-push:
  commands:
    typecheck:
      run: npx tsc --noEmit
