extends:
  - lefthook-base.yaml

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc}"
      run: biome check --write {staged_files}
      stage_fixed: true
    taplo:
      glob: "**/*.toml"
      run: taplo format {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: actionlint

pre-push:
  commands:
    typecheck:
      run: npx tsc --noEmit
