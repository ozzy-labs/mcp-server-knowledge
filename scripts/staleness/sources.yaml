# Knowledge MCP staleness verification sources.
#
# Each entry maps a knowledge article path to the sources that should be
# consulted when re-verifying its content via Claude Code Routines.
#
# Schema:
#   <article_path>:
#     group: daily | weekly | monthly
#     skip: optional bool (default false)
#     skip_reason: optional string (required when skip: true)
#     sources:
#       docs: [str]              # Public docs URLs to WebFetch
#       github_releases: [str]   # GitHub repos (owner/name) for releases API
#       rss: [str]               # RSS/Atom feed URLs
#       raw_files: [str]         # GitHub raw paths (owner/repo/HEAD/path)
#       npm: [str]               # npm package names (registry.npmjs.org/{pkg})
#       pypi: [str]              # PyPI package names
#       eol: str | null          # endoflife.date product name (or null)
#       web_search: [str]        # Web search queries (agent-driven)
#       related_internal: [str]  # Related knowledge article paths to read
#     verification:
#       confidence_threshold: high | medium | low (default medium)
#
# Confidence semantics (set per article in `verification.confidence_threshold`):
#   high   -> auto PR (clear factual delta with cross-source corroboration)
#   medium -> auto PR + [needs review] label (pattern shift suggested)
#   low    -> reviewed: update only, batched PR (no factual delta)
#   fail   -> issue created (verification material unavailable)
#
# Confirmed working endoflife.date products (2026-05-03 audit):
#   pnpm, nodejs (alias: node), python, docker-engine
# Other products (biome, vitest, prettier, astro, typescript, github-actions)
# are NOT tracked by endoflife.date; rely on GitHub releases instead.

defaults:
  verification:
    confidence_threshold: medium

