name: Sync skills

# Renovate (skills-sync preset) が .commons/sync.yaml の skills_commit を更新する。
# 本ワークフローは skills_commit に対応する skills repo の adapter 出力（dist/{adapter}/）を
# .commons/sync.yaml の skills_adapters opt-in に従って各エージェント向け配置に同期し、
# 差分があれば PR を作成する。
#
# 役割分担:
#   - Renovate: 上流 SHA の追跡（skills_commit の bump）
#   - 本ワークフロー: 物理ファイル + AGENTS.md / copilot-instructions.md の snippet 同期
#     （commons/sync-skills.sh に委譲、commons ADR-0008）
#
# Adapter 別 sync target（opt-in した adapter のみ実行）:
#   - claude-code: dist/claude-code/.claude/skills/{name}/SKILL.md → .claude/skills/{name}/SKILL.md
#   - codex-cli:   dist/codex-cli/.agents/skills/{name}/SKILL.md   → .agents/skills/{name}/SKILL.md
#                  dist/codex-cli/AGENTS.md.snippet                → AGENTS.md（マーカー間置換）
#   - gemini-cli:  dist/gemini-cli/.gemini/settings.json           → .gemini/settings.json
#                  dist/gemini-cli/AGENTS.md.snippet               → AGENTS.md（マーカー間置換）
#   - copilot:     dist/copilot/.github/copilot-instructions.md.snippet
#                                                                  → .github/copilot-instructions.md（マーカー間置換）
on:
  schedule:
    # Every Monday 00:00 UTC（sync-commons と同じ枠で運用）
    - cron: "0 0 * * 1"
  push:
    branches: [main]
    paths:
      - .commons/sync.yaml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync skills from ozzy-labs/skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read skills_commit from sync.yaml
        id: read
        run: |
          set -euo pipefail
          SHA=$(grep -E '^skills_commit:' .commons/sync.yaml | awk '{print $2}')
          if [[ -z "${SHA}" ]]; then
            echo "Error: skills_commit not found in .commons/sync.yaml" >&2
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Clone skills at recorded commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ozzy-labs/skills
          ref: ${{ steps.read.outputs.sha }}
          path: .sync-skills

      - name: Clone commons (for sync-skills.sh)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ozzy-labs/commons
          path: .sync-commons
          fetch-depth: 1

      - name: Run sync-skills.sh
        id: copy
        run: |
          set -euo pipefail
          bash .sync-commons/sync-skills.sh --yes "$GITHUB_WORKSPACE/.sync-skills/dist" "$GITHUB_WORKSPACE"
          rm -rf .sync-skills .sync-commons
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.copy.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/sync-skills
          base: main
          commit-message: |
            chore: sync skills from ozzy-labs/skills

            Automated sync from ozzy-labs/skills at ${{ steps.read.outputs.sha }}.
          title: "chore: sync skills from ozzy-labs/skills"
          body: |
            Automated sync from
            [ozzy-labs/skills](https://github.com/ozzy-labs/skills) at
            `${{ steps.read.outputs.sha }}`.

            Adapter sources（`.commons/sync.yaml` の `skills_adapters` opt-in に従う）:
            - claude-code: `dist/claude-code/.claude/skills/` → `.claude/skills/`
            - codex-cli: `dist/codex-cli/.agents/skills/` → `.agents/skills/`、
              `AGENTS.md.snippet` → `AGENTS.md`（marker 間置換）
            - gemini-cli: `dist/gemini-cli/.gemini/settings.json` → `.gemini/settings.json`、
              `AGENTS.md.snippet` → `AGENTS.md`（marker 間置換）
            - copilot: `dist/copilot/.github/copilot-instructions.md.snippet`
              → `.github/copilot-instructions.md`（marker 間置換）

            Triggered by the `Sync skills` workflow. Review the diff and merge when appropriate.
          labels: chore,skills-sync
          delete-branch: true
