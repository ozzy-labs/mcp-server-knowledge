name: ci

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          cache: true
          # Explicit token: authenticates mise's aqua / GitHub release lookups
          # (defaults exist but normalize for clarity and future repo rollout).
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # Belt-and-suspenders: some mise backends (aqua) read GITHUB_TOKEN
          # from env rather than the action input.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tools skipped in CI:
          # - trivy: local-only security scanner (lefthook pre-commit / dev use).
          #   Resolving aqua:aquasecurity/trivy releases hits 403 (rate limit / auth scope).
          # - pnpm: aqua plugin expects pnpm-linux-x64.tar.gz, but newer pnpm releases
          #   ship the binary without the .tar.gz extension. Installed via
          #   pnpm/action-setup below instead.
          # - uv: aqua attestation verification fails (provenance lookup returns None).
          #   Not used by any CI step, so just skip it.
          MISE_DISABLE_TOOLS: trivy,pnpm,uv

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: biome check .

      - name: Lint (Markdown)
        run: markdownlint-cli2 '**/*.md' '#**/node_modules' '#**/dist'

      - name: Lint (YAML)
        run: yamllint -c .yamllint.yaml .

      - name: Lint (Actions)
        run: actionlint

      - name: Validate staleness sources
        run: pnpm run validate-staleness-sources

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
