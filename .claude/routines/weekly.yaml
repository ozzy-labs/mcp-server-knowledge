notes: |
  knowledge ベースの weekly group 24 記事を毎週土曜 03:00 JST に再検証する。

  対象は scripts/staleness/sources.yaml で group: weekly と指定されたエントリ。
  想定実行時間 約 30 分。4 並列ウェーブで処理する。
  Web UI 登録後は status: active に変更し、routine_id を書き戻すこと。

# Web UI: Name
name: knowledge-staleness-weekly

# active = Web UI 登録済みで稼働中 / draft = Web UI 未登録
status: draft

# Web UI 登録後に発行される ID（trig_xxxx）。draft の間は空でよい。
routine_id: ""

# Web UI: Instructions
instructions: |
  あなたは knowledge-mcp-server リポジトリで動作する Claude Code agent です。
  本セッションは Claude Code Routines によって毎週土曜 03:00 JST に自動起動されました。
  ユーザーへの確認 (`AskUserQuestion`) は一切利用できません。すべての判断を自身で行ってください。

  ## 実行内容

  `/update --non-interactive --auto-ship --staleness-group weekly` を実行してください。

  `update` skill (`.agents/skills/update/SKILL.md` および `.claude/skills/update/SKILL.md`) のワークフローに完全に従い、以下を行います:

  1. `scripts/staleness/sources.yaml` を `yq -o json` で読み込み、`group == "weekly"` かつ `skip != true` のエントリ 24 件を抽出
  2. 4 並列ウェーブで各 `knowledge/<path>.md` を処理。各 sub-agent には sources.yaml の該当エントリと記事パスを渡し、confidence 判定と差分要約を返させる
  3. 各 source method (`docs` / `github_releases` / `rss` / `raw_files` / `npm` / `pypi` / `eol` / `web_search` / `related_internal`) で並列フェッチ
  4. 既存記事との差分を取得し、4 段階 confidence (`high` / `medium` / `low` / `fail`) で判定
  5. confidence 別に PR / バッチ PR / issue を起票:
     - **high**: 個別 PR、ブランチ `claude/staleness/<path>/<YYYYMMDD>`、タイトル `docs(knowledge): refresh <path> (<YYYY-MM-DD>)`
     - **medium**: 個別 PR + `staleness:needs-review` ラベル
     - **low**: バッチ PR、ブランチ `claude/staleness/batch/weekly/<YYYYMMDD>`、タイトル `chore(knowledge): verified N weekly articles (<YYYY-MM-DD>)`
     - **fail**: 記事は変更せず、`staleness:fetch-failed` ラベル付き issue を起票
  6. 既に open PR が `claude/staleness/<path>/*` ブランチに存在する記事は衝突回避のためスキップ
  7. lint / typecheck が失敗したら in-session で 1〜2 回まで自動修正を試行。それでも失敗する記事は fail 扱いにし、issue を起票して他記事の処理を続行

  ## 完了報告

  最後に必ず以下のサマリーを `console.log` 相当で出力してください（routine ログに残ります）:

  ```text
  [knowledge-staleness-weekly] complete:
    対象記事:    N 件
    内訳:        high X / medium Y / low Z / fail W
    個別 PR:     X+Y 件
    バッチ PR:   1 件 (low Z 件) または 0 件
    fail issue:  W 件
  ```

  ## 制約

  - 本セッションは非対話。`AskUserQuestion` を呼ばないこと
  - 機密情報（`.env` 等）は読み取らない / commit しない
  - ブランチ命名規則を逸脱した push は許可されていない
  - `main` への直接 push は禁止
  - 各 PR は 1 記事 1 commit。バッチ PR のみ複数記事を 1 commit にまとめる
  - 既知の 404 / 403 / network error は warning 扱いとし、対応する `staleness:fetch-failed` issue を起票して続行
  - 24 件の処理で実行時間が想定の 2 倍 (60 分) を超えそうな場合、未処理記事の数だけ `staleness:fetch-failed` 相当の issue を起票してから終了し、翌週の routine に委ねる

# Web UI: Model
model: claude-opus-4-7

# Web UI: Repositories
repositories:
  - ozzy-labs/knowledge-mcp-server

# Web UI: Environment
environment:
  name: knowledge-staleness
  # docs / rss / web_search で任意ドメイン取得が必要なため full
  network_access: full
  variables: []
  # scripts/staleness/setup.sh と同期。3 routine 全部で同一なので、4 個目を作る前に共通化を検討する。
  setup_script: |
    #!/usr/bin/env bash
    # Routines Environment setup for the staleness verification routines.
    #
    # Installs gh CLI (the only required tool not pre-installed in Claude Code on
    # the web sessions). yq / pnpm / jq / ripgrep are part of the base image:
    #   https://code.claude.com/docs/en/claude-code-on-the-web#installed-tools
    #
    # gh authenticates automatically via the GH_TOKEN env variable set on the
    # environment, so no `gh auth login` step is needed.
    #
    # Setup scripts run as root, so sudo is unnecessary.

    set -euo pipefail

    log() {
      printf '[staleness/setup] %s\n' "$*"
    }

    if ! command -v gh >/dev/null 2>&1; then
      log "installing gh CLI"
      # Pre-installed PPAs (deadsnakes / ondrej php) return 403 behind the cloud
      # proxy. Tolerate the InRelease failure; only the Ubuntu archive is needed
      # for the gh package, which lives in noble/universe.
      apt-get update -y || true
      apt-get install -y gh
    else
      log "gh already installed: $(gh --version | head -n1)"
    fi

    log "running pnpm install --frozen-lockfile"
    pnpm install --frozen-lockfile

    log "gh:   $(gh --version | head -n1)"
    log "yq:   $(yq --version)"
    log "pnpm: $(pnpm --version)"
    log "setup complete"

# Web UI: Trigger
triggers:
  - type: scheduled
    # 毎週土曜 03:00 JST。cron の曜日 6 = Saturday。
    cron: "0 3 * * 6"
    timezone: Asia/Tokyo

# Web UI: Connectors
connectors: []

# Web UI: Behavior
behavior:
  auto_fix_pull_requests: false

# Web UI: Permissions
permissions:
  allow_unrestricted_git_push: false
